  split: validation
  revision: 5dd9790a83002ad084ddeb7c420dc716852c6f28
  domain: general
  task_type: closed_qa        # real Google queries
  grader_type: exact
  license: CC BY-SA 3.0
  commercial_train_allowed: true
  upstream_group: natural_questions
  stage: 2
  pilot_target: 0
  stage2_target: 2000

facts_grounding:
  hub_id: google/FACTS-grounding-public
  split: public
  revision: 11b6961370aa0ac73c91d58e35317e724b2ac765
