# Campaign dataset manifest sources. Every entry pins a Hub revision so a
# re-run cannot silently drift. Pilot sources are marked stage: 0; the rest
# enter at stage 1 once Stage 0 throughput is measured.
#
# Revisions captured 2026-07-10.

trivia_qa:
  hub_id: mandarjoshi/trivia_qa
  config: rc.nocontext
  split: validation
  revision: 0f7faf33a390
  domain: general
  task_type: closed_qa
  grader_type: exact
  license: Apache-2.0
  commercial_train_allowed: true
  upstream_group: trivia_qa
  stage: 0
  # first 500 of streamed validation already used; skip them
  skip_first: 500
  pilot_target: 100
  stage1_target: 3000

popqa:
  hub_id: akariasai/PopQA
  split: test
  revision: 098765c79ea1
  domain: general
  task_type: closed_qa
  grader_type: exact
  license: MIT
  commercial_train_allowed: true
  upstream_group: popqa
  stage: 0
  # exclude the 500 in probes/popqa_500.json (seed-0 shuffle) by question text
  exclude_probe: probes/popqa_500.json
  pilot_target: 100
  stage1_target: 3000

squad_v2:
  hub_id: rajpurkar/squad_v2
  split: validation
  revision: 3ffb306f725f
  domain: general
  task_type: unanswerable
  grader_type: exact
  license: CC BY-SA 4.0
  commercial_train_allowed: true
  upstream_group: squad_v2
  stage: 0
  pilot_target: 100          # balanced answerable/unanswerable
  stage1_target: 3000
  # Stage 2 regen with the FIXED interleaving adapter: stage 1 rows were all
  # answerable (bug). Exclusion happens inside the adapter (by source_row_id)
  # so the answerable/unanswerable interleave stays balanced after exclusion.
  stage2_target: 1500
  exclude_rows_manifest: campaign/manifests/stage1.jsonl
  per_title_cap: 60           # validation has 35 titles; 20 caps the pool at ~700

halubench:
  hub_id: PatronusAI/HaluBench
  split: test
  revision: 5966a87929f5
  domain: general
  task_type: grounded_qa
  grader_type: llm            # regenerate + judge; upstream label does not transfer
  license: Apache-2.0
  commercial_train_allowed: true
  # upstream_group is taken per-row from source_ds (HaluBench aggregates others)
  stage: 0
  pilot_target: 80
  stage1_target: 3000

medhallu:
  hub_id: UTAustin-AIHealth/MedHallu
  config: pqa_labeled         # 1000 human-annotated rows first
  split: train
  revision: 515060458a94
  domain: medical
  task_type: grounded_qa
  grader_type: llm
  license: MIT
  commercial_train_allowed: true
  upstream_group: medhallu_pqa
  stage: 0
  pilot_target: 80
  stage1_target: 1000

esconv:
  hub_id: thu-coai/esconv
  split: train
  revision: 32c54c15e765
  domain: therapy
  task_type: life_decision
  grader_type: llm            # therapy rubric, NOT factual gold
  license: CC BY-NC-4.0
  commercial_train_allowed: false
  upstream_group: esconv
  stage: 0
  pilot_target: 40
  stage1_target: 800

