  grader_type: llm
  license: Apache-2.0
  commercial_train_allowed: true
  upstream_group: facts_grounding
  stage: 2
  pilot_target: 0
  stage2_target: 860          # the whole public split (long-context: cost tail)
  max_context_chars: 24000    # skip longer docs; keeps Modal cost bounded

legal_hallucinations:
